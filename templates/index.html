<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Prompt Viewer</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

#topbar{
    background:#222;
    padding:10px;
    display:flex;
    gap:10px;
    align-items:center;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
}

#dropzone{
    flex:1;
    border:2px dashed #777;
    padding:14px;
    text-align:center;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

#resetBtn{
    padding:8px 16px;
    font-size:14px;
    cursor:pointer;
}

#main{
    display:flex;
    height:calc(100vh - 100px);
    margin-top:100px;
}

#gallery{
    width:40%;
    background:#151515;
    overflow:auto;
    padding:10px;
    height:100%;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
    gap:10px;
    position:relative;
}

#gallery img.thumb{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
}

#gallery img.thumb.active{
    outline:3px solid #00eaff;
    transform:scale(1.05);
}

#galleryPreview{
    position:absolute;
    left:0;
    right:0;
    height:100%;
    background:rgba(0,0,0,0.15);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
    padding:20px;
    box-sizing:border-box;
}

#galleryPreview.show{
    display:flex;
}

#galleryPreviewImg{
    max-width:85%;
    max-height:85%;
    object-fit:contain;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    background:#111;
}

#info{
    width:60%;
    background:#1c1c1c;
    padding:20px;
    height:100%;
    overflow:auto;
    scrollbar-width:thin;
    box-shadow:-2px 0 10px rgba(0,0,0,0.5);
}

#prompt,#negative,#other{
    font-size:16px;
    line-height:1.6;
    background:#000;
    padding:20px;
    border-radius:10px;
    white-space:pre-wrap;
    margin-bottom:20px;
}

h2{
    color:#ffffff;
}

h2:nth-of-type(2){
    color:#00eaff;
}

h2:nth-of-type(3){
    color:#ff6b6b;
}

h2:nth-of-type(4){
    color:#aaaaaa;
}

#fileinfo{
    color:#ffd700;
    font-weight:bold;
    white-space:pre-wrap;
}

#toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#00eaff;
    color:#000;
    padding:10px 20px;
    border-radius:20px;
    opacity:0;
    transition:0.3s;
    pointer-events:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="dropzone">
        フォルダ / 画像 をドラッグ (PNG / WEBP / JPG)<br>
        <small style="color:#aaa;">
            ※複数ファイルの読み込みが可能です。<br>
            ※フォルダは1つずつ追加してください（複数同時は非対応）
        </small>
    </div>
    <button id="resetBtn" onclick="resetViewer()">リセット</button>
</div>

<div id="main">
    <div id="gallery">
        <div id="galleryPreview" onclick="closeGalleryPreview()">
            <img id="galleryPreviewImg" src="" alt="preview">
        </div>
    </div>

    <div id="info">
        <h2>File Info</h2>
        <div id="fileinfo"></div>

        <h2>Prompt <button onclick="copyText('prompt')">コピー</button></h2>
        <div id="prompt"></div>

        <h2>Negative <button onclick="copyText('negative')">コピー</button></h2>
        <div id="negative"></div>

        <h2>Other <button onclick="copyText('other')">コピー</button></h2>
        <div id="other"></div>
    </div>
</div>

<div id="toast">コピーしました</div>

<script>
const gallery = document.getElementById("gallery")
const dropzone = document.getElementById("dropzone")

let currentSelectedIndex = -1
let allFiles = []
let currentIndex = 0
const BATCH = 60

function openGalleryPreview(file){
    const preview = document.getElementById("galleryPreview")
    const previewImg = document.getElementById("galleryPreviewImg")

    const url = URL.createObjectURL(file)
    previewImg.src = url

    preview.style.top = gallery.scrollTop + "px"
    preview.classList.add("show")

    previewImg.onload = ()=>{
        URL.revokeObjectURL(url)
    }
}

function closeGalleryPreview(){
    const preview = document.getElementById("galleryPreview")
    const previewImg = document.getElementById("galleryPreviewImg")

    preview.classList.remove("show")
    previewImg.src = ""
}

function showToast(){
    const toast = document.getElementById("toast")
    toast.style.opacity = 1
    setTimeout(()=>{
        toast.style.opacity = 0
    },1500)
}

function copyText(id){
    const text = document.getElementById(id).textContent
    navigator.clipboard.writeText(text)
    showToast()
}

function resetViewer(){
    document.querySelectorAll("#gallery img.thumb").forEach(img=>img.remove())

    allFiles = []
    currentIndex = 0
    currentSelectedIndex = -1

    closeGalleryPreview()

    document.getElementById("prompt").textContent = ""
    document.getElementById("negative").textContent = ""
    document.getElementById("other").textContent = ""
    document.getElementById("fileinfo").textContent = ""
}

document.addEventListener("keydown", (e)=>{
    const isPreviewOpen = document.getElementById("galleryPreview").classList.contains("show")

    if(e.key === "Escape"){
        closeGalleryPreview()
        return
    }

    if(currentSelectedIndex === -1) return

    if(e.key === "ArrowRight"){
        currentSelectedIndex++
    } else if(e.key === "ArrowLeft"){
        currentSelectedIndex--
    } else {
        return
    }

    if(currentSelectedIndex < 0) currentSelectedIndex = 0
    if(currentSelectedIndex >= allFiles.length) currentSelectedIndex = allFiles.length - 1

    const file = allFiles[currentSelectedIndex]
    readPrompt(file)
    openGalleryPreview(file)

    const imgs = document.querySelectorAll("#gallery img.thumb")
    imgs.forEach(el=>el.classList.remove("active"))

    if(imgs[currentSelectedIndex]){
        imgs[currentSelectedIndex].classList.add("active")
        imgs[currentSelectedIndex].scrollIntoView({block:"center"})
    }
})

dropzone.addEventListener("dragover", e=>{
    e.preventDefault()
})

dropzone.addEventListener("drop", async (e)=>{
    e.preventDefault()

    let files = []

    for(let f of e.dataTransfer.files){
        f._root = " "
        files.push(f)
    }

    if(e.dataTransfer.items){
        for(let item of e.dataTransfer.items){
            let entry = item.webkitGetAsEntry?.()
            if(entry){
                await scanEntry(entry, files, entry.name)
            }
        }
    }

    loadFiles(files)
})

async function scanEntry(entry, files, rootName){
    if(entry.isFile){
        await new Promise(resolve=>{
            entry.file(file=>{
                file._root = rootName
                files.push(file)
                resolve()
            })
        })
    } else if(entry.isDirectory){
        const reader = entry.createReader()

        while(true){
            const entries = await new Promise(resolve=>{
                reader.readEntries(resolve)
            })

            if(entries.length === 0) break

            for(const e of entries){
                await scanEntry(e, files, rootName)
            }
        }
    }
}

function loadFiles(files){
    let newFiles = files.filter(file=>{
        let name = file.name.toLowerCase()
        return name.endsWith(".png") ||
               name.endsWith(".webp") ||
               name.endsWith(".jpg") ||
               name.endsWith(".jpeg")
    })

    const seen = new Set(allFiles.map(f => f.name + "_" + f.size))

    let added = 0

    for(let f of newFiles){
        let key = f.name + "_" + f.size
        if(!seen.has(key)){
            allFiles.push(f)
            seen.add(key)
            added++
        }
    }

    loadNextBatch()
    console.log("追加枚数:", added)
}

function loadNextBatch(){
    let end = currentIndex + BATCH
    if(end > allFiles.length){
        end = allFiles.length
    }

    let slice = allFiles.slice(currentIndex, end)

    for(let file of slice){
        let url = URL.createObjectURL(file)

        let img = document.createElement("img")
        img.src = url
        img.className = "thumb"

        img.onclick = ()=>{
            readPrompt(file)

            document.querySelectorAll("#gallery img.thumb").forEach(el=>el.classList.remove("active"))
            img.classList.add("active")

            currentSelectedIndex = allFiles.indexOf(file)
            openGalleryPreview(file)
        }

        img.onload = ()=> URL.revokeObjectURL(url)

        gallery.appendChild(img)
    }

    currentIndex = end
}

gallery.addEventListener("scroll", ()=>{
    if(gallery.scrollTop + gallery.clientHeight >= gallery.scrollHeight - 400){
        if(currentIndex < allFiles.length){
            loadNextBatch()
        }
    }
})

async function readPrompt(file){
    const formData = new FormData()
    formData.append("file", file)

    const res = await fetch("/read", {
        method:"POST",
        body:formData
    })

    const data = await res.json()
    const parsed = parsePrompt(data.text)

    document.getElementById("prompt").textContent = parsed.prompt
    document.getElementById("negative").textContent = parsed.negative

    const otherData = parseOther(parsed.other)
    document.getElementById("other").textContent = formatOther(otherData)

    const rootFolder = file._root || "（取得失敗）"

    document.getElementById("fileinfo").textContent =
        "Folder : " + rootFolder + "\n" +
        "File   : " + file.name
    
        
}

function parsePrompt(text){
    let prompt = ""
    let negative = ""
    let other = ""

    let negIndex = text.indexOf("Negative prompt:")

    if(negIndex !== -1){
        prompt = text.slice(0, negIndex).trim()

        let rest = text.slice(negIndex + "Negative prompt:".length)
        let stepsIndex = rest.indexOf("Steps:")

        if(stepsIndex !== -1){
            negative = rest.slice(0, stepsIndex).trim()
            other = rest.slice(stepsIndex).trim()
        } else {
            negative = rest.trim()
        }
    } else {
        let stepsIndex = text.indexOf("Steps:")

        if(stepsIndex !== -1){
            prompt = text.slice(0, stepsIndex).trim()
            other = text.slice(stepsIndex).trim()
        } else {
            prompt = text.trim()
        }
    }

    return {prompt, negative, other}
}

function parseOther(text){
    let data = {}
    let parts = text.split(",")

    for(let part of parts){
        let p = part.trim()

        if(p.includes(":")){
            let key = p.split(":")[0].trim()
            let value = p.split(":").slice(1).join(":").trim()
            data[key] = value
        }
    }

    return data
}

function formatOther(data){
    let out = ""

    if(data["Sampler"]) out += "Sampler : " + data["Sampler"] + "\n"
    if(data["Steps"]) out += "Steps : " + data["Steps"] + "\n"
    if(data["CFG scale"]) out += "CFG : " + data["CFG scale"] + "\n"
    if(data["Seed"]) out += "Seed : " + data["Seed"] + "\n"
    if(data["Size"]) out += "Size : " + data["Size"] + "\n"
    if(data["Model"]) out += "Model : " + data["Model"] + "\n"

    return out
}
</script>

</body>
</html>
