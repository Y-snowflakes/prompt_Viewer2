<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI Prompt Viewer</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

#topbar{
padding:10px;
background:#222;
}

#viewer{
display:flex;
height:90vh;
}

#gallery{
width:40%;
overflow:auto;
display:grid;
grid-template-columns:repeat(auto-fill,120px);
gap:10px;
padding:10px;
}

#gallery img{
width:120px;
cursor:pointer;
border-radius:6px;
}

#info{
width:60%;
padding:20px;
overflow:auto;
background:#181818;
}

#dropzone{
border:2px dashed #666;
padding:40px;
margin:10px;
text-align:center;
}

pre{
white-space:pre-wrap;
}

button{
padding:8px 20px;
margin-left:10px;
}

</style>

</head>

<body>

<div id="topbar">

<input type="file" id="fileInput" multiple webkitdirectory>

<button onclick="resetViewer()">リセット</button>

</div>

<div id="dropzone">

フォルダ / PNG をドラッグ

</div>

<div id="viewer">

<div id="gallery"></div>

<div id="info">

<h3>Prompt</h3>

<pre id="prompt"></pre>

</div>

</div>

<script>

const dropzone = document.getElementById("dropzone")
const gallery = document.getElementById("gallery")
const promptBox = document.getElementById("prompt")
const fileInput = document.getElementById("fileInput")

let images = []

dropzone.addEventListener("dragover",e=>{

e.preventDefault()

})

dropzone.addEventListener("drop",e=>{

e.preventDefault()

loadFiles(e.dataTransfer.files)

})

fileInput.addEventListener("change",e=>{

loadFiles(e.target.files)

})

function resetViewer(){

gallery.innerHTML=""
promptBox.textContent=""
images=[]

}

function loadFiles(files){

gallery.innerHTML=""

for(let file of files){

if(!file.name.toLowerCase().endsWith(".png")) continue

let url = URL.createObjectURL(file)

let img = document.createElement("img")

img.src = url

img.onclick = ()=>readMetadata(file)

gallery.appendChild(img)

}

}

function readMetadata(file){

const reader = new FileReader()

reader.onload = function(e){

const img = new Image()

img.onload = function(){

const canvas = document.createElement("canvas")

const ctx = canvas.getContext("2d")

canvas.width = img.width
canvas.height = img.height

ctx.drawImage(img,0,0)

fetch(e.target.result)
.then(res=>res.arrayBuffer())
.then(buffer=>{

const decoder = new TextDecoder()

let text = decoder.decode(buffer)

let start = text.indexOf("parameters")

if(start!=-1){

promptBox.textContent = text.slice(start,start+2000)

}else{

promptBox.textContent="No metadata"

}

})

}

img.src = e.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
