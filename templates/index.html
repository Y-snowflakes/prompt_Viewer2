<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Prompt Viewer</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

/* 上バー */

#topbar{
background:#222;
padding:10px;
display:flex;
gap:10px;
align-items:center;
}

/* メイン */

#main{
display:flex;
height:calc(100vh - 50px);
}

/* 左 */

#gallery{
width:40%;
background:#151515;
overflow:auto;
padding:10px;

display:grid;
grid-template-columns:repeat(auto-fill,140px);
gap:10px;
}

#gallery img{
width:140px;
border-radius:8px;
cursor:pointer;
}

/* 右 */

#info{
width:60%;
background:#1c1c1c;
padding:20px;
overflow:auto;
}

/* ドロップ */

#dropzone{
border:2px dashed #777;
padding:30px;
margin-bottom:20px;
text-align:center;
font-size:18px;
}

/* プロンプト */

#prompt{
font-size:18px;
line-height:1.6;
white-space:pre-wrap;
background:#000;
padding:20px;
border-radius:10px;
}

button{
padding:6px 16px;
font-size:14px;
}

</style>
</head>

<body>

<div id="topbar">

<input type="file" id="fileInput" multiple webkitdirectory>

<button onclick="resetViewer()">リセット</button>

</div>

<div id="main">

<div id="gallery"></div>

<div id="info">

<div id="dropzone">

フォルダ / 画像 をドラッグ  
(PNG / WEBP / JPG)

</div>

<h2>Prompt</h2>

<div id="prompt"></div>

</div>

</div>

<script>

const gallery = document.getElementById("gallery")
const promptBox = document.getElementById("prompt")
const fileInput = document.getElementById("fileInput")
const dropzone = document.getElementById("dropzone")

/* リセット */

function resetViewer(){

gallery.innerHTML=""
promptBox.textContent=""

}

/* フォルダ読み込み */

fileInput.addEventListener("change",e=>{

loadFiles(e.target.files)

})

/* ドラッグ */

dropzone.addEventListener("dragover",e=>{
e.preventDefault()
})

dropzone.addEventListener("drop",e=>{

e.preventDefault()

loadFiles(e.dataTransfer.files)

})

/* ファイル読み込み */

function loadFiles(files){

gallery.innerHTML=""

for(let file of files){

let name=file.name.toLowerCase()

if(
!name.endsWith(".png") &&
!name.endsWith(".webp") &&
!name.endsWith(".jpg") &&
!name.endsWith(".jpeg")
) continue

let url=URL.createObjectURL(file)

let img=document.createElement("img")

img.src=url

img.onclick=()=>readPrompt(file)

gallery.appendChild(img)

}

}

/* プロンプト抽出 */

function readPrompt(file){

if(!file.name.toLowerCase().endsWith(".png")){

promptBox.textContent="PNG以外はメタデータ取得できない場合があります"

return

}

const reader=new FileReader()

reader.onload=function(e){

let text=new TextDecoder().decode(e.target.result)

let pos=text.indexOf("parameters")

if(pos!=-1){

promptBox.textContent=text.slice(pos,pos+3000)

}else{

promptBox.textContent="メタデータなし"

}

}

reader.readAsArrayBuffer(file)

}

</script>

</body>
</html>
