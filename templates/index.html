<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI Prompt Viewer</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

/* 上バー */

#topbar{
height:50px;
background:#222;
display:flex;
align-items:center;
padding:0 10px;
gap:10px;
}

/* メインレイアウト */

#main{
display:flex;
height:calc(100vh - 50px);
}

/* 左ギャラリー */

#gallery{

width:40%;
background:#151515;
overflow:auto;
padding:10px;

display:grid;
grid-template-columns:repeat(auto-fill,120px);
gap:10px;

}

/* サムネ */

#gallery img{

width:120px;
cursor:pointer;
border-radius:6px;
transition:0.15s;

}

#gallery img:hover{

transform:scale(1.05);

}

/* 右パネル */

#info{

width:60%;
background:#1e1e1e;
padding:20px;
overflow:auto;

}

/* ドロップ */

#dropzone{

border:2px dashed #777;
padding:30px;
margin-bottom:20px;
text-align:center;

}

/* prompt */

pre{

white-space:pre-wrap;
font-size:14px;

}

button{

padding:6px 14px;

}

</style>

</head>

<body>

<div id="topbar">

<input type="file" id="fileInput" multiple webkitdirectory>

<button onclick="resetViewer()">リセット</button>

</div>

<div id="main">

<div id="gallery"></div>

<div id="info">

<div id="dropzone">

フォルダ / PNG をドラッグ

</div>

<h3>Prompt</h3>

<pre id="prompt"></pre>

</div>

</div>

<script>

const gallery = document.getElementById("gallery")
const promptBox = document.getElementById("prompt")
const fileInput = document.getElementById("fileInput")
const dropzone = document.getElementById("dropzone")

function resetViewer(){

gallery.innerHTML=""
promptBox.textContent=""

}

/* フォルダ選択 */

fileInput.addEventListener("change",e=>{

loadFiles(e.target.files)

})

/* ドロップ */

dropzone.addEventListener("drop", async (e)=>{

e.preventDefault()

let items = e.dataTransfer.items

let files = []

for(let item of items){

let entry = item.webkitGetAsEntry()

if(entry.isFile){

item.getAsFile && files.push(item.getAsFile())

}

if(entry.isDirectory){

let reader = entry.createReader()

reader.readEntries(entries=>{

for(let ent of entries){

ent.file(file=>{
files.push(file)
loadFiles(files)
})

}

})

}

}

loadFiles(files)

})

/* 読み込み */

function loadFiles(files){

gallery.innerHTML=""

for(let file of files){

if(!file.name.toLowerCase().endsWith(".png")) continue

let url = URL.createObjectURL(file)

let img = document.createElement("img")

img.src = url

img.onclick = ()=>readPrompt(file)

gallery.appendChild(img)

}

}

/* メタデータ */

function readPrompt(file){

const reader = new FileReader()

reader.onload = function(e){

const buffer = e.target.result
const bytes = new Uint8Array(buffer)

let text = ""

for(let i=0;i<bytes.length-10;i++){

if(
bytes[i]==112 && // p
bytes[i+1]==97 && // a
bytes[i+2]==114 && // r
bytes[i+3]==97 && // a
bytes[i+4]==109 && // m
bytes[i+5]==101 && // e
bytes[i+6]==116 && // t
bytes[i+7]==101 && // e
bytes[i+8]==114 && // r
bytes[i+9]==115    // s
){

let start=i+11
let end=start+2000

text = new TextDecoder().decode(bytes.slice(start,end))

break

}

}

if(text===""){
promptBox.textContent="No metadata"
}else{
promptBox.textContent=text
}

}

reader.readAsArrayBuffer(file)

}

</script>

</body>
</html>
