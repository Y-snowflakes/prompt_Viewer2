<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Prompt Viewer</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

/* 上バー */

#topbar{
background:#222;
padding:10px;
display:flex;
gap:10px;
align-items:center;
}

/* メイン */

#main{
display:flex;
height:calc(100vh - 50px);
}

/* 左 */

#gallery{
width:40%;
background:#151515;
overflow:auto;
padding:10px;

display:grid;
grid-template-columns:repeat(auto-fill,140px);
gap:10px;
}

#gallery img{
width:140px;
border-radius:8px;
cursor:pointer;
}

/* 右 */

#info{
width:60%;
background:#1c1c1c;
padding:20px;
overflow:auto;
}

/* ドロップ */

#dropzone{
border:2px dashed #777;
padding:30px;
margin-bottom:20px;
text-align:center;
font-size:18px;
}

/* プロンプト */

#prompt,#negative,#other{
font-size:18px;
line-height:1.7;
background:#000;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
margin-bottom:20px;
}

button{
padding:6px 16px;
font-size:14px;
}

</style>
</head>

<body>

<div id="topbar">

<input type="file" id="fileInput" multiple webkitdirectory>

<button onclick="resetViewer()">リセット</button>

</div>

<div id="main">

<div id="gallery"></div>

<div id="info">

<div id="dropzone">

フォルダ / 画像 をドラッグ  
(PNG / WEBP / JPG)

</div>

<h2>Prompt</h2>
<div id="prompt"></div>

<h2>Negative</h2>
<div id="negative"></div>

<h2>Other</h2>
<div id="other"></div>

</div>

</div>

<script>

const gallery = document.getElementById("gallery")
const promptBox = document.getElementById("prompt")
const fileInput = document.getElementById("fileInput")
const dropzone = document.getElementById("dropzone")

/* リセット */

function resetViewer(){

gallery.innerHTML=""
promptBox.textContent=""

}

/* フォルダ読み込み */

fileInput.addEventListener("change",e=>{

loadFiles(e.target.files)

})

/* ドラッグ */

dropzone.addEventListener("dragover",e=>{
e.preventDefault()
})

dropzone.addEventListener("drop",e=>{

e.preventDefault()

loadFiles(e.dataTransfer.files)

})

/* ファイル読み込み */

function loadFiles(files){

gallery.innerHTML=""

for(let file of files){

let name=file.name.toLowerCase()

if(
!name.endsWith(".png") &&
!name.endsWith(".webp") &&
!name.endsWith(".jpg") &&
!name.endsWith(".jpeg")
) continue

let url=URL.createObjectURL(file)

let img=document.createElement("img")

img.src=url

img.onclick=()=>readPrompt(file)

gallery.appendChild(img)

}

}

/* プロンプト抽出 */

function readPrompt(file){

const reader = new FileReader()

reader.onload = function(e){

const buffer = e.target.result
const view = new DataView(buffer)

let offset = 8
let prompt = ""

while(offset < view.byteLength){

let length = view.getUint32(offset)
offset += 4

let type = ""
for(let i=0;i<4;i++){
type += String.fromCharCode(view.getUint8(offset+i))
}
offset += 4

let bytes = new Uint8Array(buffer, offset, length)

if(type === "tEXt" || type === "iTXt" || type === "zTXt"){

let text = new TextDecoder("utf-8",{fatal:false}).decode(bytes)

if(text.includes("parameters")){
prompt = text.replace("parameters","").trim()
break
}

}

offset += length + 4

}

if(prompt){

let data = parsePrompt(prompt)

document.getElementById("prompt").textContent = data.prompt
document.getElementById("negative").textContent = data.negative
document.getElementById("other").textContent = data.other

}else{

document.getElementById("prompt").textContent = "メタデータなし"

}

}

reader.readAsArrayBuffer(file)

}


function parsePrompt(text){

let prompt=""
let negative=""
let other=""

let negIndex = text.indexOf("Negative prompt:")

if(negIndex!=-1){

prompt = text.slice(0,negIndex).trim()

let rest = text.slice(negIndex + 16)

let split = rest.split("\n\n")

negative = split[0].trim()

other = rest.slice(negative.length).trim()

}else{

prompt=text

}

return {prompt,negative,other}

}

if(prompt){

let data=parsePrompt(prompt)

document.getElementById("prompt").textContent=data.prompt
document.getElementById("negative").textContent=data.negative
document.getElementById("other").textContent=data.other

}else{
promptBox.textContent="メタデータなし"
}

</script>

</body>
</html>
