<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PNG Metadata Viewer</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

#drop{
border:2px dashed #888;
padding:50px;
margin:40px;
}

.item{
background:#222;
padding:10px;
margin:20px;
text-align:left;
}

pre{
white-space:pre-wrap;
}

</style>

</head>
<body>

<h2>フォルダまたは画像をドラッグしてください</h2>

<div id="drop">ここにドロップ</div>

<div id="list"></div>

<script>

const drop = document.getElementById("drop")
const list = document.getElementById("list")

drop.addEventListener("dragover", e=>{
    e.preventDefault()
})

drop.addEventListener("drop", async e=>{

    e.preventDefault()

    const files = e.dataTransfer.files

    const formData = new FormData()

    for(let f of files){

        formData.append("files", f)
    }

    list.innerHTML = "解析中..."

    const res = await fetch("/",{
        method:"POST",
        body:formData
    })

    const html = await res.text()

    document.open()
    document.write(html)
    document.close()

})

</script>

{% for r in results %}

<div class="item">

<b>{{r.name}}</b>

<pre>{{r.text}}</pre>

</div>

{% endfor %}

</body>
</html>
